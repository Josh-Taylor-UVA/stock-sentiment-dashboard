name: Monthly Data Refresh

on:
  schedule:
    # Runs at 10:00 UTC on the 5th of every month
    # cron format is: minute hour day-of-month month day-of-week
    - cron: '0 10 5 * *'
  # Allows you to trigger it manually from the GitHub Actions tab for testing
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run data prep script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python ss_data_prep.py

      - name: Commit and push updated CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add df_sent_stock.csv
          git diff --quiet --cached || git commit -m "Automated monthly data refresh"
          git push